<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details-Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="../output.css" rel="stylesheet">


</head>

<body class="bg-gray-900">


  <!-- Navbar -->
  <nav class="bg-black">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        
        <!-- Logo -->
        <div class="flex-shrink-0 text-xl font-bold text-white">
          <span class="text-red-700 font-bold">FIVE</span> <span class="font-bold">WATCH</span>
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex space-x-6">
          <a href="#" class="text-gray-400 hover:text-white">Home</a>
          <a href="#" class="text-gray-400 hover:text-white">Browse Movies</a>
          <a href="#" class="text-red-700 font-bold hover:text-white">Movies Details</a>
        </div>

        <!-- Search + Profile -->
        <div class="hidden md:flex items-center space-x-4">
          <input type="text" placeholder="Search..." class="px-3 py-1 rounded bg-red-700 text-white focus:outline-none">
        </div>

        <!-- Mobile menu button -->
        <div class="md:hidden text-white">
          <button id="menu-btn" class="focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
        </div>

      </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden px-4 pb-4">
      <a href="#" class="block py-2 text-white hover:text-red-400">Home</a>
      <a href="#" class="block py-2 text-white hover:text-red-400">Browse Movies</a>
      <a href="#" class="block py-2 text-red-700 font-bold hover:text-red-400">Movies Details</a>
      <input type="text" placeholder="Search..." class="w-full mt-2 px-3 py-1 rounded bg-red-700 text-white focus:outline-none">
    </div>
  </nav>

  <!-- HERO -->
    <!-- movie-poster  .....(background-image) -->
    <section class="relative h-[80vh] bg-cover bg-center" id="movie-poster"
        style="background-image:url('https://image.tmdb.org/t/p/original/qJ2tW6WMUDux911r6m7haRef0WH.jpg')">
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70 to-transparent"></div>

        <div class="absolute bottom-10 left-10 max-w-xl">
            <h1 class="text-5xl font-bold text-white mb-4" id="movie-title">Inception</h1>
            <!-- movie-description -->
            <p class="text-gray-400 mb-4" id="movie-description">
                A thief who steals corporate secrets through dream-sharing technology is given the inverse task of
                planting an idea.
            </p>
            <div class="flex gap-4">
                <button class="bg-white text-black px-6 py-2 rounded font-semibold hover:bg-red-700 "> <span
                        class="bg-red-700 text-red-700 "></span><i class="fa-solid fa-play text-red-600 "></i>
                    Play</button>
                <button class="bg-red-600 px-6 py-2 text-white font-bold rounded hover:bg-red-700">+ Watch List</button>
            </div>
            <!-- movie-rating,year,duration -->
            <div class="mt-4 text-sm text-gray-400">
                <!-- movie-rating -->
                <span class="" id=" movie-rating ">⭐ 8.8 •</span>
                <!-- movie-year -->
                <span id="movie-year">2026 •</span>
                <!-- movie-duration -->
                <span id="movie-description">2h 28m</span>

            </div>


        </div>
    </section>

  <script>
    const btn = document.getElementById('menu-btn');
    const menu = document.getElementById('mobile-menu');

    btn.addEventListener('click', () => {
      menu.classList.toggle('hidden');
    });
  </script>







</body>

</html>
