<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details-Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="../output.css" rel="stylesheet">


</head>

<body class="bg-gray-900">


  <!-- Navbar -->
  <nav class="bg-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        
        <!-- Logo -->
        <div class="flex-shrink-0 text-xl font-bold text-white">
          MovieHub
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex space-x-6">
          <a href="#" class="text-white hover:text-red-400">Home</a>
          <a href="#" class="text-white hover:text-red-400">Movies</a>
          <a href="#" class="text-white hover:text-red-400">My List</a>
        </div>

        <!-- Search + Profile -->
        <div class="hidden md:flex items-center space-x-4">
          <input type="text" placeholder="Search..." class="px-3 py-1 rounded bg-gray-700 focus:outline-none">
        </div>

        <!-- Mobile menu button -->
        <div class="md:hidden text-white">
          <button id="menu-btn" class="focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
        </div>

      </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden px-4 pb-4">
      <a href="#" class="block py-2 text-white hover:text-red-400">Home</a>
      <a href="#" class="block py-2 text-white hover:text-red-400">Movies</a>
      <a href="#" class="block py-2 text-white hover:text-red-400">My List</a>
      <input type="text" placeholder="Search..." class="w-full mt-2 px-3 py-1 rounded bg-gray-700 focus:outline-none">
    </div>
  </nav>

  <script>
    const btn = document.getElementById('menu-btn');
    const menu = document.getElementById('mobile-menu');

    btn.addEventListener('click', () => {
      menu.classList.toggle('hidden');
    });
  </script>







</body>

</html>
