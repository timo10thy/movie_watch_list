<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="../output.css" rel="stylesheet">
  <title>Login - Movie Watch List</title>
</head>
<body class="bg-gray-900 min-h-screen">
  <nav class="bg-gray-800 p-4">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-white text-2xl font-bold"> Movie Watch List</h1>
      <div class="space-x-6">
        <a href="index.html" class="text-red-500 hover:text-red-600">Home</a>
        <a href="movies.html" class="text-red-500 hover:text-red-600">Movies</a>
        <a href="details.html" class="text-red-500 hover:text-red-600">Details</a>
      </div>
    </div>
  </nav>

  <main class="flex items-center justify-center min-h-[calc(100vh-80px)] px-4">
    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md">
      <h2 class="text-white text-3xl font-bold text-center mb-8">Login</h2>
      
      <form id="login-form" class="space-y-6">

        <div>
          <label for="username-input" class="block text-gray-400 text-sm font-medium mb-2">
            Username
          </label>
          <input 
            type="text" 
            id="username-input" 
            name="username"
            class="w-full px-4 py-3 bg-gray-700 text-white border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent"
            placeholder="Enter your username"
            required
          >
        </div>
        <div id="login-error" class="hidden text-red-500 text-sm text-center">
          Please enter a valid username
        </div>
        <button 
          type="submit"
          id="login-btn"
          class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 ease-in-out transform hover:scale-105"
        >
          Login
        </button>
        <div class="text-center mt-6">
          <a href="index.html" class="text-red-500 hover:text-red-600 text-sm">
            ← Back to Homepage
          </a>
        </div>
      </form>
    </div>
  </main>
  <script src="../script.js"></script>
</body>
</html>
