<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FiveWatch — Login</title>
  <link href="../output.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>

<body class="bg-[#0f0f0f] text-white font-[Inter] antialiased min-h-screen flex flex-col">

  <!-- NAVBAR -->
  <nav class="w-full bg-black/90 backdrop-blur border-b border-white/10">
    <div class="max-w-7xl mx-auto px-4 sm:px-8">
      <div class="flex items-center justify-between h-14 sm:h-16">

        <!-- Logo -->
        <a href="../../index.html" class="text-2xl sm:text-3xl text-red-600 font-[Bebas_Neue] tracking-wide">
          FIVE<span class="text-white">WATCH</span>
        </a>

        <!-- Nav Links — hidden on mobile -->
        <div class="hidden md:flex gap-8 text-sm font-medium">
          <a href="../../index.html" class="text-gray-400 hover:text-white transition-colors">Home</a>
          <a href="movies.html"      class="text-gray-400 hover:text-white transition-colors">Browse Movies</a>
          <a href="details.html"     class="text-gray-400 hover:text-white transition-colors">Movie Details</a>
        </div>

        <!-- Mobile — Sign Up link -->
        <a href="signup.html" class="md:hidden text-red-500 text-sm font-medium">
          Sign Up
        </a>

      </div>
    </div>
  </nav>


  <!-- MAIN -->
  <main class="flex-1 flex items-center justify-center px-4 sm:px-6 py-10 sm:py-16">
    <div class="w-full max-w-sm sm:max-w-md">

      <!-- Card -->
      <div class="bg-[#1c1c1c] rounded-lg border border-white/10 p-6 sm:p-8">

        <!-- Header -->
        <div class="text-center mb-6 sm:mb-8">
          <h1 class="text-3xl sm:text-4xl font-[Bebas_Neue] tracking-wide text-white mb-1 sm:mb-2">
            Welcome Back
          </h1>
          <p class="text-gray-400 text-xs sm:text-sm">
            Sign in to continue watching
          </p>
        </div>

        <!-- Error Message -->
        <div
          id="login-error"
          class="hidden bg-red-600/20 border border-red-600 text-red-400 text-xs sm:text-sm px-3 sm:px-4 py-2 sm:py-3 rounded mb-5 sm:mb-6"
        >
          Invalid credentials. Please try again.
        </div>

        <!-- Form -->
        <form id="login-form" class="flex flex-col gap-4 sm:gap-5">

          <!-- Email -->
          <div class="flex flex-col gap-1.5">
            <label for="email-input" class="text-xs sm:text-sm font-medium text-gray-400">
              Email Address
            </label>
            <input
              type="email"
              id="email-input"
              placeholder="Enter your email"
              class="bg-[#0f0f0f] border border-white/10 text-white text-xs sm:text-sm rounded px-3 sm:px-4 py-2.5 sm:py-3 placeholder-gray-600 focus:outline-none focus:border-red-600 transition-colors w-full"
            />
          </div>

          <!-- Password -->
          <div class="flex flex-col gap-1.5">
            <div class="flex items-center justify-between">
              <label for="password-input" class="text-xs sm:text-sm font-medium text-gray-400">
                Password
              </label>
              <a href="#" class="text-xs text-red-500 hover:text-red-600 transition-colors">
                Forgot password?
              </a>
            </div>
            <input
              type="password"
              id="password-input"
              placeholder="Enter your password"
              class="bg-[#0f0f0f] border border-white/10 text-white text-xs sm:text-sm rounded px-3 sm:px-4 py-2.5 sm:py-3 placeholder-gray-600 focus:outline-none focus:border-red-600 transition-colors w-full"
            />
          </div>

          <!-- Login Button -->
          <button
            type="button"
            id="login-btn"
            class="bg-red-600 hover:bg-red-700 text-white font-semibold text-sm py-2.5 sm:py-3 rounded transition-colors mt-1 sm:mt-2 w-full"
          >
            Sign In
          </button>

        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-5 sm:my-6">
          <div class="flex-1 border-t border-white/10"></div>
          <span class="text-gray-600 text-xs">OR</span>
          <div class="flex-1 border-t border-white/10"></div>
        </div>

        <!-- Sign Up Link -->
        <p class="text-center text-gray-400 text-xs sm:text-sm">
          Don't have an account?
          <a href="signup.html" class="text-red-500 hover:text-red-600 font-medium transition-colors">
            Sign Up
          </a>
        </p>

      </div>

      <!-- Back to Home -->
      <p class="text-center text-gray-600 text-xs mt-5 sm:mt-6">
        <a href="../../index.html" class="hover:text-gray-400 transition-colors">
          ← Back to Home
        </a>
      </p>

    </div>
  </main>


  <!-- FOOTER -->
  <footer class="bg-[#1c1c1c] border-t border-white/10 py-5 sm:py-6">
    <div class="text-center text-gray-400 text-xs sm:text-sm">
      &copy; 2026 FiveWatch — Educational Project
    </div>
  </footer>

  <script src="../../js_pages/script.js"></script>

</body>
</html>
