<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="../output.css" rel="stylesheet">
    <script src="../script.js"></script>
</head>
<body class="bg-gray-900">
    <!--Header-->
    <header class="shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-red-500">MovieBox</h1>
      <nav class="space-x-6 hidden md:block">
        <a href="index.html" class="text-red-600 hover:text-red-700">Home</a>
        <a href="login.html" class="text-red-600 hover:text-red-700">Login</a>
      </nav>
    </div>
  </header>

  <!-- Search & Filters -->
  <section class="max-w-7xl mx-auto px-4 py-6">
    <div class="flex flex-col md:flex-row gap-4 justify-between">
      
       <!-- Search Input -->
        <div class="mb-6">
            <input
                type="text"
                id="search-input"
                placeholder="Search movies…"
                class="w-full p-3 rounded bg-gray-800 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500"
            />
        </div>

        <!-- Genre Filters -->
        <div id="genre-filters" class="flex flex-wrap gap-3 mb-6">
            <button data-genre="All" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded">
                All
            </button>
            <button data-genre="Action" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded">
                Action
            </button>
            <button data-genre="Comedy" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded">
                Comedy
            </button>
            <button data-genre="Drama" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded">
                Drama
            </button>
            <button data-genre="Horror" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded">
                Horror
            </button>
        </div>
    </div>
  </section>
  

</body>
</html>
