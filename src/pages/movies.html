<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FiveWatch | Movies</title>
  <link href="../output.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
</head>

<body class="bg-black text-white font-[Inter] antialiased">

  <nav class="fixed top-0 w-full z-50 bg-black/90 backdrop-blur border-b border-white/10">
    <div class="max-w-7xl mx-auto px-5 sm:px-8">
      <div class="flex items-center justify-between h-14 md:h-16">
        <a href="../../index.html" class="text-2xl md:text-3xl text-red-600 font-[Bebas_Neue] tracking-wide">
          FIVE<span class="text-white">WATCH</span>
        </a>

        <div class="hidden md:flex gap-8 text-sm font-medium">
          <a href="../../index.html" class="text-gray-400 hover:text-white transition-colors">Home</a>
          <a href="movies.html"      class="text-red-600">Browse Movies</a>
        </div>

        <div class="hidden md:flex items-center gap-4">
          <a href="login.html" class="text-white text-sm bg-red-600 hover:bg-red-700 px-4 py-2 rounded transition-colors">
            Login
          </a>
        </div>

        <button id="hamburger" class="md:hidden flex flex-col gap-1.5 p-1">
          <span class="w-6 h-0.5 bg-white rounded"></span>
          <span class="w-6 h-0.5 bg-white rounded"></span>
          <span class="w-4 h-0.5 bg-white rounded"></span>
        </button>

      </div>
    </div>

    <div id="mobile-menu" class="hidden md:hidden bg-[#1c1c1c] border-t border-white/10 px-5 py-4 flex-col gap-4">
      <a href="../../index.html" class="text-gray-400 hover:text-white text-sm font-medium block transition-colors">Home</a>
      <a href="movies.html"      class="text-red-600 text-sm font-medium block">Browse Movies</a>
      <a href="login.html"       class="text-gray-400 hover:text-white text-sm font-medium block transition-colors">Login</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 pb-10 pt-20">
    <section class="max-w-7xl py-6">
      <div class="flex flex-col md:flex-row gap-4 justify-between">

        <div class="mb-6">
          <input type="text" id="search-input" placeholder="Search movies…"
            class="w-full p-3 rounded bg-white/10 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500" />
        </div>

        <div id="genre-filters" class="flex flex-wrap gap-3 mb-6">
          <button data-genre="All"    class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded text-sm font-medium transition-colors">All</button>
          <button data-genre="Action" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded text-sm font-medium transition-colors">Action</button>
          <button data-genre="Comedy" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded text-sm font-medium transition-colors">Comedy</button>
          <button data-genre="Drama"  class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded text-sm font-medium transition-colors">Drama</button>
          <button data-genre="Horror" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded text-sm font-medium transition-colors">Horror</button>
        </div>

      </div>
    </section>

    <div id="movies-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
     
    </div>
  </main>


  <footer class="bg-[#1c1c1c] border-t border-white/10 py-6 md:py-8">
    <div class="max-w-7xl mx-auto px-5 sm:px-8">

      <div class="flex flex-col md:flex-row items-center justify-between gap-4 md:gap-6 mb-5 md:mb-6">
        <a href="../../index.html" class="text-xl md:text-2xl font-[Bebas_Neue] tracking-widest text-red-600">
          FIVE<span class="text-white">WATCH</span>
        </a>
        <div class="flex flex-wrap justify-center gap-4 md:gap-6 text-xs md:text-sm">
          <a href="../../index.html" class="text-red-500 hover:text-red-600 transition-colors">Home</a>
          <a href="movies.html"      class="text-gray-400 hover:text-white transition-colors">Browse Movies</a>
          <a href="login.html"       class="text-gray-400 hover:text-white transition-colors">Login</a>
        </div>
      </div>

      <div class="border-t border-white/10 pt-5 md:pt-6 text-center text-gray-400 text-xs md:text-sm">
        &copy; 2026 FiveWatch — Educational Project
      </div>

    </div>
  </footer>

  <script src="../../js_pages/script.js"></script>

</body>
</html>
